services:
  mysql:
    image: mysql:8.0
    container_name: hostgrowth-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: hostgrowth_root
      MYSQL_DATABASE: hostgrowth_db
      MYSQL_USER: hostgrowth
      MYSQL_PASSWORD: hostgrowth_pass
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: hostgrowth-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    profiles:
      - with-redis

volumes:
  mysql_data:
  redis_data:
